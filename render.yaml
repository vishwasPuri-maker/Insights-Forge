services:
  - type: web
    name: Insights-Forge
    runtime: python
    repo: https://github.com/ganeshzambare-git/Insights-Forge
    branch: main
    rootDir: scraper/backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT