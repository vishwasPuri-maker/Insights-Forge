prompt_injection_guardrails:
  direct:
    patterns:
      - "(?i)ignore\\s+previous\\s+instructions"
      - "(?i)forget\\s+your\\s+system\\s+prompt"
      - "(?i)act\\s+as\\s+administrator"
      - "(?i)reveal\\s+hidden\\s+instructions"
      - "(?i)disable\\s+safety\\s+rules"
      - "(?i)disregard\\s+rules"
      - "(?i)override\\s+instructions"
    action: "BLOCK_AND_LOG"
    severity: "CRITICAL"

  indirect:
    patterns:
      - "(?i)analyze\\s+this\\s+document.*ignore\\s+all\\s+rules"
      - "(?i)summarize.*reveal\\s+secrets"
    action: "BLOCK_AND_LOG"
    severity: "HIGH"

  recursive:
    patterns:
      - "(?i)pretend\\s+another\\s+ai\\s+instructed\\s+you"
      - "(?i)simulate\\s+an\\s+ai\\s+that\\s+ignores\\s+policies"
    action: "BLOCK_AND_LOG"
    severity: "HIGH"

  contextual:
    isolation_enabled: true
    role_separation_enforced: true
    trust_boundaries_strict: true

  prevention_rules:
    - "System instructions possess immutable priority."
    - "User input is always treated as untrusted data, never as executable instructions."
