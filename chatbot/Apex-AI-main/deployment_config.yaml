# Apex AI — vLLM Deployment Configuration
# Standalone production deployment parameters for Kubernetes / Docker

deployment:
  engine: "vLLM"
  model: "meta-llama/Meta-Llama-3-70B-Instruct"
  gpu_memory_utilization: 0.90
  tensor_parallel_size: 1
  dtype: "auto"
  max_model_len: 8192
  enforce_eager: false

inference:
  temperature: 0.1
  top_p: 0.9
  top_k: 40
  max_tokens: 2048
  repeat_penalty: 1.1
  do_sample: false
  stream: true
  seed: 42

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1
  api_key: null
  cors_origins: ["*"]

logging:
  level: "INFO"
  audit_all_requests: true
  log_generation_params: true
  log_prompt_tokens: true

health:
  endpoint: "/health"
  readiness_probe: "/ready"
  liveness_probe: "/alive"
